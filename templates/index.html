<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Citibike NYC Route Heatmap</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <!-- App CSS -->
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

  <!-- Map container -->
  <div id="map"></div>

  <!-- Control panel -->
  <div id="control-panel">
    <h2>Citibike Heatmap</h2>

    <!-- Metadata summary -->
    <div id="metadata-bar">Loading data…</div>

    <!-- Hour range slider -->
    <div class="control-group">
      <div class="control-label">Time of day: <span id="hour-label">All day</span></div>
      <div class="dual-range" id="hour-range">
        <div class="dual-range-track"><div class="dual-range-fill" id="hour-fill"></div></div>
        <input type="range" id="hour-min" min="0" max="23" value="0" step="1" />
        <input type="range" id="hour-max" min="0" max="23" value="23" step="1" />
      </div>
      <div class="dual-range-labels">
        <span>12am</span><span>6am</span><span>12pm</span><span>6pm</span><span>11pm</span>
      </div>
    </div>

    <!-- Month pills -->
    <div class="control-group">
      <div class="control-label">Month</div>
      <div class="month-pills" id="month-pills">
        <button class="month-pill active" data-month="0">Jan</button>
        <button class="month-pill active" data-month="1">Feb</button>
        <button class="month-pill active" data-month="2">Mar</button>
        <button class="month-pill active" data-month="3">Apr</button>
        <button class="month-pill active" data-month="4">May</button>
        <button class="month-pill active" data-month="5">Jun</button>
        <button class="month-pill active" data-month="6">Jul</button>
        <button class="month-pill active" data-month="7">Aug</button>
        <button class="month-pill active" data-month="8">Sep</button>
        <button class="month-pill active" data-month="9">Oct</button>
        <button class="month-pill active" data-month="10">Nov</button>
        <button class="month-pill active" data-month="11">Dec</button>
      </div>
    </div>

    <!-- Color mode -->
    <div class="control-group">
      <div class="control-label">Color routes by</div>
      <label class="toggle-label">
        <input type="radio" name="color-mode" value="volume" checked />
        Trip volume
      </label>
      <label class="toggle-label">
        <input type="radio" name="color-mode" value="electric" />
        E-bike share
      </label>
      <label class="toggle-label">
        <input type="radio" name="color-mode" value="member" />
        Member share
      </label>
    </div>

    <!-- Layer toggles -->
    <div class="control-group">
      <label class="toggle-label">
        <input id="toggle-routes" type="checkbox" checked />
        O-D Routes
      </label>
      <label class="toggle-label">
        <input id="toggle-heatmap" type="checkbox" checked />
        Station Heatmap
      </label>
      <label class="toggle-label">
        <input id="toggle-subway" type="checkbox" />
        Subway Map
      </label>
    </div>

    <!-- Legend -->
    <div id="legend">
      <div class="legend-title" id="legend-title">Trip volume</div>
      <div class="legend-gradient"></div>
      <div class="legend-labels">
        <span id="legend-low">Low</span><span id="legend-high">High</span>
      </div>
    </div>
  </div>

  <!-- Toast notification area -->
  <div id="toast-area"></div>

  <!-- Scripts -->
  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- Leaflet.heat -->
  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
  <!-- App JS -->
  <script src="/static/js/map.js"></script>
</body>
</html>
